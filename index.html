<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wordy — тебя вызвали на дуэль</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Onest:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2e2e2e;
            --green: #538d4e;
            --yellow: #b59f3b;
            --gray: #3a3a3c;
            --text: #ffffff;
            --muted: #818384;
        }
 
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Onest', sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }
 
        /* Ambient glow background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(83,141,78,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(181,159,59,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
 
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 360px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
 
        /* Logo */
        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 36px;
            letter-spacing: -1px;
            color: var(--text);
        }
 
        /* Tiles row */
        .tiles {
            display: flex;
            gap: 8px;
        }
 
        .tile {
            width: 52px;
            height: 52px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--text);
            border-radius: 4px;
            opacity: 0;
            transform: translateY(12px) scale(0.9);
            animation: tileIn 0.4s ease forwards;
        }
 
        .tile:nth-child(1) { animation-delay: 0.1s; }
        .tile:nth-child(2) { animation-delay: 0.2s; background: var(--green); border-color: var(--green); }
        .tile:nth-child(3) { animation-delay: 0.3s; background: var(--yellow); border-color: var(--yellow); }
        .tile:nth-child(4) { animation-delay: 0.4s; }
        .tile:nth-child(5) { animation-delay: 0.5s; background: var(--green); border-color: var(--green); }
 
        @keyframes tileIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
 
        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.7s forwards;
        }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        .card-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--green);
        }
 
        .card-title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 20px;
            text-align: center;
            line-height: 1.3;
            margin-top: 4px;
        }
 
        .card-sub {
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            margin-top: 4px;
        }
 
        /* Button */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Onest', sans-serif;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            margin-top: 8px;
        }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
 
        .btn-primary {
            background: var(--green);
            color: #fff;
        }
 
        .btn-secondary {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            font-size: 13px;
        }
 
        .status {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            min-height: 20px;
        }
 
        .dot {
            display: inline-block;
            animation: blink 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
 
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">WORDY</div>
 
    <div class="tiles">
        <div class="tile">?</div>
        <div class="tile">?</div>
        <div class="tile">?</div>
        <div class="tile">?</div>
        <div class="tile">?</div>
    </div>
 
    <div class="card">
        <div class="card-label">Дружеский режим</div>
        <div class="card-title">Тебя вызвали угадать слово</div>
        <div class="card-sub">Откроем Wordy прямо сейчас</div>
 
        <button class="btn btn-primary" id="openBtn" onclick="tryOpen()">
            Открыть игру
        </button>
        <a class="btn btn-secondary" id="storeBtn" href="https://www.rustore.ru/catalog/app/com.sinya.projects.wordle" style="display:none;">
            Скачать Wordy в RuStore
        </a>
    </div>
 
    <div class="status" id="status">
        Запускаем приложение<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
</div>
 
<script>
    const params = new URLSearchParams(window.location.search);
    const word = params.get('word');
    const packageName = 'com.sinya.projects.wordle';
    const storeUrl = `https://www.rustore.ru/catalog/app/${packageName}`;
    const deepLink = `wordy://invite?word=${word}`;
 
    function tryOpen() {
        const startTime = Date.now();
        window.location.href = deepLink;
 
        setTimeout(() => {
            const elapsed = Date.now() - startTime;
            // Если фокус остался (приложение не открылось)
            document.getElementById('status').textContent = 'Приложение не найдено. Скачай Wordy в RuStore 👇';
            document.getElementById('storeBtn').style.display = 'flex';
            document.getElementById('openBtn').textContent = 'Попробовать снова';
        }, 1600);
    }
 
    // Автозапуск только если есть word в параметре
    if (word) {
        tryOpen();
    } else {
        document.getElementById('status').textContent = 'Ссылка недействительна';
    }
</script>
</body>
</html>
